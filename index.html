<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intranet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/8110/8110176.png" type="image/x-icon">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050505;
            color: white;
        }

        .hero {
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            background: radial-gradient(circle at center, #001f3f 0%, #050505 100%);
        }

        .content {
            width: 100%;
            max-width: 1200px;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
        }

        h1 span {
            color: #00d4ff;
            text-shadow: 0 0 15px #00d4ff;
        }

        p {
            margin-top: 8px;
            opacity: 0.7;
        }

        .favorites-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .category h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            text-align: left;
            border-bottom: 1px solid #00d4ff44;
            padding-bottom: 8px;
        }

        .fav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .fav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px;
            background: rgba(17, 17, 17, 0.95);
            color: #ddd;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid #00d4ff22;
            transition: 0.3s;
            font-size: 1rem;
        }

        .fav-item:hover {
            background: #00d4ff;
            color: #050505;
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
    </style>
</head>

<body>

    <main class="hero">
        <div class="content">
            <h1>Meus <span>Favoritos</span></h1>
            <p>Acesse rapidamente seus principais sites</p>

            <section class="favorites-container">

                <div class="category">
                    <h2>Dia a Dia</h2>
                    <div class="fav-grid">
                        <a href="https://outlook.live.com/" target="_blank" class="fav-item"><i class="fas fa-envelope"></i> Outlook</a>
                        <a href="https://www.youtube.com/" target="_blank" class="fav-item"><i class="fab fa-youtube"></i> YouTube</a>
                        <a href="https://translate.google.com.br/" target="_blank" class="fav-item"><i class="fas fa-language"></i> Tradutor</a>
                        <a href="https://web.whatsapp.com/" target="_blank" class="fav-item"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                        <a href="https://br.linkedin.com/" target="_blank" class="fav-item"><i class="fab fa-linkedin"></i> LinkedIn</a>
                        <a href="https://www.instagram.com/" target="_blank" class="fav-item"><i class="fab fa-instagram"></i> Instagram</a>
                    </div>
                </div>

                <div class="category">
                    <h2>Inteligência Artificial</h2>
                    <div class="fav-grid">
                        <a href="https://chatgpt.com/" target="_blank" class="fav-item"><i class="fas fa-robot"></i> ChatGPT</a>
                        <a href="https://gemini.google.com/app?hl=pt-BR" target="_blank" class="fav-item"><i class="fas fa-robot"></i> Gemini</a>
                        <a href="https://grok.com/" target="_blank" class="fav-item"><i class="fas fa-brain"></i> Grok</a>
                        <a href="https://gamma.app/" target="_blank" class="fav-item"><i class="fas fa-magic"></i> Gamma</a>
                    </div>
                </div>

                <div class="category">
                    <h2>Lojas</h2>
                    <div class="fav-grid">
                        <a href="https://www.terabyteshop.com.br/" target="_blank" class="fav-item"><i class="fas fa-shop"></i> Terabyte</a>
                        <a href="https://www.pichau.com.br/" target="_blank" class="fav-item"><i class="fas fa-shop"></i> Pichau</a>
                        <a href="https://www.mercadolivre.com.br/" target="_blank" class="fav-item"><i class="fas fa-shop"></i> Mercado Livre</a>
                        <a href="https://www.amazon.com.br/" target="_blank" class="fav-item"><i class="fas fa-shop"></i> Amazon</a>
                    </div>
                </div>

                <div class="category">
                    <h2>Outros</h2>
                    <div class="fav-grid">
                        <a href="https://www.reidobailao.com.br/" target="_blank" class="fav-item"><i class="fas fa-link"></i> Rei do Bailão</a>
                        <a href="https://sciweb.com.br/" target="_blank" class="fav-item"><i class="fas fa-globe"></i> SCI WEB</a>
                    </div>
                </div>

            </section>
        </div>
    </main>

</body>
</html>
