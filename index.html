
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTRANET IGOR DANIEL LUCIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/8110/8110176.png" type="image/x-icon">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050505;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero {
            width: 100%;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #001f3f 0%, #050505 100%);
            min-height: 100vh;
        }

        .content {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        h1 {
            font-size: 2.6rem;
        }

        h1 span {
            color: #00d4ff;
            text-shadow: 0 0 15px #00d4ff;
        }

        p {
            margin-top: 8px;
            opacity: 0.7;
        }

        .favorites-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .category h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #00d4ff44;
            padding-bottom: 8px;
        }

        .fav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            justify-items: center;
        }

        @media (max-width: 700px) {
            .fav-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 400px) {
            .fav-grid {
                grid-template-columns: 1fr;
            }
        }

        .fav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 20px;
            background: rgba(17, 17, 17, 0.95);
            color: #ddd;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid #00d4ff22;
            transition: 0.3s;
            font-size: 0.95rem;
            width: 100%;
        }

        .fav-item:hover {
            background: #00d4ff;
            color: #050505;
            transform: translateY(-4px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .fav-item i {
            font-size: 1rem;
            width: 18px;
            text-align: center;
        }
    </style>
</head>

<body>

    <main class="hero">
        <div class="content">
            <h1>Meus <span>Favoritos</span></h1>
            <p>Acesse rapidamente seus principais sites</p>

            <section class="favorites-container">

                <div class="category">
                    <h2>Mais utilizados</h2>
                    <div class="fav-grid">
                        <a href="https://outlook.live.com/" target="_blank" class="fav-item"><i class="fas fa-envelope"></i> Outlook</a>
                        <a href="https://mail.google.com/mail/u/0/?pli=1#inbox" target="_blank" class="fav-item"><i class="fas fa-envelope"></i> Gmail</a>
                        <a href="https://www.youtube.com/" target="_blank" class="fav-item"><i class="fab fa-youtube"></i> YouTube</a>
                        <a href="https://translate.google.com.br/" target="_blank" class="fav-item"><i class="fas fa-language"></i> Tradutor</a>
                        <a href="https://web.whatsapp.com/" target="_blank" class="fav-item"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                        <a href="https://br.linkedin.com/" target="_blank" class="fav-item"><i class="fab fa-linkedin"></i> LinkedIn</a>
                        <a href="https://sat.sef.sc.gov.br/tax.NET/Login.aspx?ReturnUrl=%2ftax.NET%2ftax.Net.NFE%2fNfa_Solicitacao.aspx" target="_blank" class="fav-item"><i class="fas fa-file-invoice"></i> S@t</a>
                        <a href="https://github.com/igordaniel11" target="_blank" class="fav-item"><i class="fab fa-github"></i> GitHub</a>
                        <a href="https://chatgpt.com/" target="_blank" class="fav-item"><i class="fas fa-robot"></i> ChatGPT</a>
                        <a href="https://gemini.google.com/app?hl=pt-BR/" target="_blank" class="fav-item"><i class="fas fa-star"></i> Gemini</a>
                        <a href="https://1password.com/pt/password-generator" target="_blank" class="fav-item"><i class="fas fa-key"></i> 1Password</a>
                        <a href="https://www.speedtest.net/pt" target="_blank" class="fav-item"><i class="fas fa-tachometer-alt"></i> Speedtest</a>
                    </div>
                </div>

            </section>
        </div>
    </main>

</body>
</html>
